<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCI Quiz Practice Portal</title>
  <style>
    :root { --primary: #3b82f6; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e2937);
      color: white;
      margin: 0;
      padding: 0;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 0 20px; }
    h1 {
      font-size: 2.8rem;
      background: linear-gradient(90deg, #60a5fa, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #94a3b8; font-size: 1.3rem; }

    .nav {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 30px 0;
    }
    .nav button {
      padding: 10px 22px;
      border: none;
      background: #334155;
      color: white;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
    }
    .nav button.active, .nav button:hover { background: var(--primary); }

    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: #1e2937;
      border-radius: 16px;
      padding: 25px;
      transition: 0.3s;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }

    .start-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 15px;
    }

    .quiz-container {
      display: none;
      background: #1e2937;
      border-radius: 16px;
      padding: 35px;
      margin-top: 20px;
    }
    .progress { text-align: center; font-size: 1.3rem; margin-bottom: 25px; color: #94a3b8; }
    .question { font-size: 1.4rem; line-height: 1.65; margin-bottom: 30px; }

    .options { display: flex; flex-direction: column; gap: 14px; }
    .option {
      background: #334155;
      padding: 18px 22px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    .option:hover { background: #475569; }
    .option.selected { border-color: #60a5fa; }
    .option.correct { background: #166534 !important; border-color: #4ade80; color: white; }
    .option.wrong { background: #7f1d1d !important; border-color: #f87171; color: white; }

    .nav-buttons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }
    .nav-buttons button {
      padding: 14px 28px;
      font-size: 1.05rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      flex: 1;
    }
    #prev-btn { background: #64748b; }
    #next-btn { background: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>HCI Quiz Practice Portal</h1>
      <p class="subtitle">Human-Computer Interaction • All 12 Weeks + Mixed Quiz (120 Questions)</p>
    </header>

    <div class="nav">
      <button onclick="startQuiz(0)" class="active" id="nav-0">Mixed Quiz (120 Qs)</button>
      <button onclick="startQuiz(1)" id="nav-1">Week 1</button>
      <button onclick="startQuiz(2)" id="nav-2">Week 2</button>
      <button onclick="startQuiz(3)" id="nav-3">Week 3</button>
      <button onclick="startQuiz(4)" id="nav-4">Week 4</button>
      <button onclick="startQuiz(5)" id="nav-5">Week 5</button>
      <button onclick="startQuiz(6)" id="nav-6">Week 6</button>
      <button onclick="startQuiz(7)" id="nav-7">Week 7</button>
      <button onclick="startQuiz(8)" id="nav-8">Week 8</button>
      <button onclick="startQuiz(9)" id="nav-9">Week 9</button>
      <button onclick="startQuiz(10)" id="nav-10">Week 10</button>
      <button onclick="startQuiz(11)" id="nav-11">Week 11</button>
      <button onclick="startQuiz(12)" id="nav-12">Week 12</button>
    </div>

    <div id="home-screen">
      <div class="quiz-grid" id="quiz-grid"></div>
    </div>

    <!-- Quiz Area -->
    <div id="quiz-screen" class="quiz-container">
      <div class="progress">Question <span id="q-number">1</span> / <span id="total-q">10</span></div>
      <div class="question" id="question-text"></div>
      <div class="options" id="options-container"></div>

      <div class="nav-buttons">
        <button id="prev-btn" onclick="prevQuestion()">← Previous</button>
        <button id="next-btn" onclick="nextQuestion()">Next Question →</button>
      </div>
    </div>

    <!-- Score Screen -->
    <div id="score-screen" class="quiz-container score-screen" style="display:none;">
      <h2>Your Score</h2>
      <div id="final-score"></div>
      <p id="score-message" style="font-size:1.5rem; margin:25px 0;"></p>
      <button onclick="restartCurrentQuiz()" style="background:#3b82f6; color:white; padding:15px 40px; border:none; border-radius:50px; font-size:1.1rem; margin:10px;">Try Again</button>
      <button onclick="goHome()" style="background:#64748b; color:white; padding:15px 40px; border:none; border-radius:50px; font-size:1.1rem; margin:10px;">Back to Home</button>
    </div>
  </div>

  <script>
    // ==================== ALL 12 WEEKS QUESTIONS ====================
    const weekQuestions = [

      [

        {q:"What is the first step in deciding what to design?", options:["Finalizing the brand logo","Identifying who the users are","Choosing color schemes","Deciding the marketing plan"], ans:1},

        {q:"A common challenge in user perspectives is:", options:["Too many designers","Conflicting needs among different user groups","Unlimited research time","Lack of design tools"], ans:1},
        {q:"Affinity mapping is mainly used to:", options:["Assign tasks to team members","Organize qualitative data into themes","Remove unnecessary system features","Design UI wireframes"], ans:1},
        {q:"A POV (Point of View) statement includes:", options:["System hardware requirements","User, need, and insight","UI color preferences","Coding-level issues"], ans:1},
        {q:"Data clustering helps in:", options:["Grouping users based on similar behaviors","Randomly distributing users","Increasing device performance","Removing prototypes"], ans:0}
      ],

      // Week 5
      [
        {q:"Which of the following best describes a conceptual model?", options:["A detailed UI layout","A mental representation of how a system works","A list of system requirements","A coding guideline document"], ans:1},
        {q:"What is an example of an assumption in interface design?", options:["Testing a prototype with users","Taking something for granted without evidence","Mapping user journeys","Writing code before wireframes"], ans:1},
        {q:"Which component is commonly used in online shopping conceptual models?", options:["Homepage wallpaper","Shopping cart","Video playback controls","Battery indicator"], ans:1},
        {q:"Interface metaphors help users by:", options:["Making systems slower","Increasing hardware complexity","Leveraging familiarity for learning new systems","Removing the need for feedback"], ans:2},
        {q:"Which cognitive principle states that decision time increases with more choices?", options:["Miller’s Law","Fitts’s Law","Hick’s Law","Gestalt Law of Proximity"], ans:2},
        {q:"What is the purpose of a system image?", options:["To describe internal code structure","To show how the system actually works through the interface","To explain marketing strategy","To define business revenue"], ans:1},
        {q:"Which of the following is a drawback of interface metaphors?", options:["They always reduce cognitive load","They break all cultural norms","They may limit designers’ creativity","They remove the need for conceptual models"], ans:2},
        {q:"Cognitive load increases when:", options:["Interfaces use familiar patterns","Users see excessive irrelevant information","Steps are minimized","Icons are consistent"], ans:1},

        {q:"Which of the following is a qualitative data-gathering technique?", options:["Analytics logs","Surveys with multiple-choice questions","User interviews","System performance metrics"], ans:2},

        {q:"Which of the following is a key issue in data ethics?", options:["Increasing app performance","User interface color selection","Transparency in how data is collected and used","Adding more user features"], ans:2},
        {q:"Inter-Annotator Agreement (IAA) is used to:", options:["Visualize data using graphs","Measure consistency among multiple annotators","Improve system performance","Replace manual labeling"], ans:1},

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let currentMode = 0;
    let userAnswers = [];

    function shuffleOptions(question) {
      const originalAns = question.ans;
      let combined = question.options.map((text, idx) => ({text, idx}));
      
      for (let i = combined.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [combined[i], combined[j]] = [combined[j], combined[i]];
      }

      const newOptions = combined.map(item => item.text);
      const newAnsIndex = combined.findIndex(item => item.idx === originalAns);

      return { q: question.q, options: newOptions, ans: newAnsIndex };
    }

    function startQuiz(mode) {
      currentMode = mode;
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      document.getElementById(`nav-${mode}`).classList.add('active');

      let selectedQs = [];
      if (mode === 0) {
        for (let i = 1; i <= 12; i++) {
          selectedQs = selectedQs.concat(weekQuestions[i]);
        }
      } else {
        selectedQs = [...weekQuestions[mode]];
      }

      currentQuestions = selectedQs.map(q => shuffleOptions(q))
                                 .sort(() => Math.random() - 0.5);

      currentIndex = 0;
      score = 0;
      userAnswers = new Array(currentQuestions.length).fill(-1);

      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      document.getElementById('score-screen').style.display = 'none';

      document.getElementById('total-q').textContent = currentQuestions.length;
      loadQuestion();
    }

    function loadQuestion() {
      const q = currentQuestions[currentIndex];
      document.getElementById('q-number').textContent = currentIndex + 1;
      document.getElementById('question-text').textContent = q.q;

      const container = document.getElementById('options-container');
      container.innerHTML = '';

      q.options.forEach((option, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = `<strong>${String.fromCharCode(65 + i)}.</strong> ${option}`;
        div.onclick = () => selectOption(i, div);
        container.appendChild(div);
      });

      if (userAnswers[currentIndex] !== -1) {
        const options = document.querySelectorAll('.option');
        options[userAnswers[currentIndex]].classList.add('selected');
      }

      document.getElementById('next-btn').textContent = (currentIndex === currentQuestions.length - 1) 
        ? "Finish Quiz & See Score" : "Next Question →";
      document.getElementById('prev-btn').disabled = (currentIndex === 0);
    }

    function selectOption(index, element) {
      document.querySelectorAll('.option').forEach(el => {
        el.classList.remove('selected', 'correct', 'wrong');
      });

      element.classList.add('selected');
      userAnswers[currentIndex] = index;

      const correctIndex = currentQuestions[currentIndex].ans;
      const options = document.querySelectorAll('.option');

      if (index === correctIndex) {
        options[index].classList.add('correct');
      } else {
        options[index].classList.add('wrong');
        options[correctIndex].classList.add('correct');
      }
    }

    function nextQuestion() {
      if (userAnswers[currentIndex] === -1) return;

      if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        loadQuestion();
      } else {
        calculateFinalScore();
        showScore();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        loadQuestion();
      }
    }

    function calculateFinalScore() {
      score = 0;
      for (let i = 0; i < currentQuestions.length; i++) {
        if (userAnswers[i] === currentQuestions[i].ans) {
          score++;
        }
      }
    }

    function showScore() {
      document.getElementById('quiz-screen').style.display = 'none';
      const scoreScreen = document.getElementById('score-screen');
      scoreScreen.style.display = 'block';

      const totalQ = currentQuestions.length;
      const percent = Math.round((score / totalQ) * 100);

      document.getElementById('final-score').innerHTML = `${score}/${totalQ}<br><span style="font-size:2rem;">${percent}%</span>`;

      const msg = percent >= 80 ? "🎉 Excellent! You have mastered the topic!" :
                  percent >= 60 ? "👍 Good performance! Keep practicing." :
                  "📚 Review the concepts again. You will improve!";
      document.getElementById('score-message').innerHTML = msg;
    }

    function restartCurrentQuiz() {
      startQuiz(currentMode);
    }

    function goHome() {
      document.getElementById('score-screen').style.display = 'none';
      document.getElementById('home-screen').style.display = 'block';
    }

    // Initialize Home Cards
    window.onload = () => {
      const grid = document.getElementById('quiz-grid');
      const titles = [
        "Mixed Quiz (All 120 Questions)",
        "Week 1 : Introduction to HCI",
        "Week 2 : Interaction Design & UX",
        "Week 3 : Design Thinking",
        "Week 4 : User Perspectives & Research",
        "Week 5 : Conceptual Models & Cognition",
        "Week 6 : Data Requirements & Ethics",
        "Week 7 : Prototyping",
        "Week 8 : Evaluation in HCI",
        "Week 9 : IoT & HCI",
        "Week 10 : AI, LLMs & Multimodal",
        "Week 11 : Privacy & Security",
        "Week 12 : Conversational AI & Ethics"
      ];

      titles.forEach((title, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3>${title}</h3>
          <p>${i === 0 ? '120 Random MCQs' : '10 MCQs'} • Options shuffled every time</p>
          <button class="start-btn" onclick="startQuiz(${i})">Start Quiz Now</button>
        `;
        grid.appendChild(card);
      });
    };
  </script>
</body>
</html>
